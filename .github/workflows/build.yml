name: build

permissions:
  contents: write
  
on: [push, pull_request]

jobs:
  build:
    strategy:
      matrix:
        java: [21]
    runs-on: ubuntu-latest
    steps:
      - name: checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: validate gradle wrapper
        uses: gradle/actions/wrapper-validation@v3

      - name: setup jdk ${{ matrix.java }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ matrix.java }}
          distribution: 'microsoft'

      - name: make gradle executable
        run: chmod +x gradlew

      - name: build
        run: ./gradlew :Fabric:build

      - name: capture build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Artifacts
          path: Fabric/build/libs/

      - name: get version and changelog
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        id: metadata
        run: |
          # Matches only the line starting with 'version='
          VERSION=$(grep "^version=" gradle.properties | cut -d'=' -f2)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          
          # Generate changelog from commit history (last 10 commits)
          echo "changelog<<EOF" >> $GITHUB_OUTPUT
          git log -n 10 --oneline --pretty=format:"* %s (%h)" >> $GITHUB_OUTPUT
          echo "" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: create release
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.metadata.outputs.version }}
          name: Voxy World Gen v${{ steps.metadata.outputs.version }} (Alpha)
          body: |
            ## Recent Changes
            ${{ steps.metadata.outputs.changelog }}
          prerelease: true
          files: Fabric/build/libs/*.jar
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_TOKEN }}
